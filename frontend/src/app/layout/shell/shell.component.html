<div class="layout">

    <!-- TOP BAR -->
    <header class="toolbar">
        <span class="logo">EmployeeHub</span>

        <span class="spacer"></span>

        <div class="user-profile">
            <span class="username">
                <span class="material-icons">account_circle</span>
                {{ username }}
            </span>
            <!-- Nutzt die native Material-Button-Optik -->
            <button mat-button class="logout-btn" (click)="logout()">
                <span class="material-icons">logout</span>
                Logout
            </button>
        </div>
    </header>

    <!-- BODY -->
    <div class="body-container">

        <!-- SIDEBAR -->
        <nav class="sidebar">
            <!-- routerLinkActive markiert die aktive Seite optisch -->
            <a routerLink="/dashboard" routerLinkActive="active-link">
                <span class="material-icons">dashboard</span>
                Dashboard
            </a>
            <a routerLink="/employees" routerLinkActive="active-link">
                <span class="material-icons">people</span>
                Employees
            </a>
            <a routerLink="/departments" routerLinkActive="active-link">
                <span class="material-icons">business</span>
                Departments
            </a>
        </nav>

        <!-- CONTENT -->
        <main class="content-area">
            <router-outlet></router-outlet>
        </main>

    </div>
</div>

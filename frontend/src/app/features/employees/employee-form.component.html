<!-- Offizieller M3 Dialog-Titel -->
<h2 mat-dialog-title>{{ isEditMode ? 'Edit Employee' : 'New Employee' }}</h2>

<!-- Scrollbarer Inhaltsbereich mit sauberem Spacing -->
<mat-dialog-content>
    <form [formGroup]="form" class="employee-form">

        <div class="form-grid">
            <mat-form-field appearance="outline">
                <mat-label>First Name</mat-label>
                <input matInput formControlName="firstName" placeholder="e.g. Jane">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Last Name</mat-label>
                <input matInput formControlName="lastName" placeholder="e.g. Doe">
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
            <mat-label>Email Address</mat-label>
            <mat-icon matPrefix>mail</mat-icon>
            <input matInput type="email" formControlName="email" placeholder="jane.doe@company.com">
        </mat-form-field>

        <div class="form-grid form-grid--compact">
            <mat-form-field appearance="outline">
                <mat-label>Entry Date</mat-label>
                <input matInput type="date" formControlName="entryDate">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Exit Date</mat-label>
                <input matInput type="date" formControlName="exitDate">
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
            <mat-label>Department</mat-label>
            <mat-icon matPrefix>business</mat-icon>
            <mat-select formControlName="departmentId">
                @for (department of departments; track department.id) {
                <mat-option [value]="department.id">
                    {{ department.name }}
                </mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Skills</mat-label>
            <mat-icon matPrefix>psychology</mat-icon>
            <mat-select formControlName="skillIds" multiple>
                @for (skill of skills; track skill.id) {
                <mat-option [value]="skill.id">
                    {{ skill.name }}
                </mat-option>
                }
            </mat-select>
        </mat-form-field>

    </form>
</mat-dialog-content>

<!-- Fixierte Aktionsleiste am unteren Rand -->
<mat-dialog-actions align="end">
    <!-- Unauffälliger Text-Button für Abbrechen -->
    <button mat-button type="button" (click)="cancel()">
        Cancel
    </button>

    <!-- Gefüllter M3-Button (nimmt automatisch das Azure-Blau an) -->
    <button mat-flat-button type="submit" [disabled]="form.invalid" (click)="save()">
        {{ isEditMode ? 'Update' : 'Create' }}
    </button>
</mat-dialog-actions>

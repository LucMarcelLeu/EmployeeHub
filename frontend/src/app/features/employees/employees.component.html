<!-- FILTER- UND AKTIONBAR -->
<div class="table-toolbar">
    <button mat-flat-button (click)="openCreate()">
        <mat-icon>add</mat-icon>
        Add Employee
    </button>

    <!-- Auf M3 Outline-Stil mit Icon aktualisiert -->
    <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search employees...</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput (input)="onSearch($event)" placeholder="e.g. John Doe">
    </mat-form-field>
</div>

<!-- CONTAINER FÜR DIE TABELLE (wichtig für abgerundete Ecken und Scrollbars) -->
<div class="table-container mat-elevation-z1">
    <table mat-table [dataSource]="dataSource" matSort>

        <!-- First Name -->
        <ng-container matColumnDef="firstName">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>First Name</th>
            <td mat-cell *matCellDef="let e">{{ e.firstName }}</td>
        </ng-container>

        <!-- Last Name -->
        <ng-container matColumnDef="lastName">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Last Name</th>
            <td mat-cell *matCellDef="let e">{{ e.lastName }}</td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let e" class="text-secondary">{{ e.email }}</td>
        </ng-container>

        <!-- Entry Date -->
        <ng-container matColumnDef="entryDate">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Entry Date</th>
            <td mat-cell *matCellDef="let e">{{ e.entryDate || '—' }}</td>
        </ng-container>

        <!-- Exit Date -->
        <ng-container matColumnDef="exitDate">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Exit Date</th>
            <td mat-cell *matCellDef="let e">{{ e.exitDate || '—' }}</td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="col-actions">Actions</th>
            <td mat-cell *matCellDef="let employee" class="col-actions" (click)="$event.stopPropagation()">
                @if (isAdmin) {
                <button mat-icon-button type="button" (click)="openEdit(employee)" title="Edit">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button type="button" class="btn-delete" (click)="delete(employee)" title="Delete">
                    <mat-icon>delete</mat-icon>
                </button>
                }
            </td>
        </ng-container>

        <!-- Zeilendefinitionen -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="openEdit(row)"></tr>

    </table>

    <!-- Paginator nahtlos an den Tabellen-Container angefügt -->
    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons>
    </mat-paginator>
</div>

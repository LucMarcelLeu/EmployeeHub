<div class="toolbar">
    <button mat-raised-button color="primary" (click)="openCreate()">
        + Add Employee
    </button>

    <mat-form-field>
        <input matInput placeholder="Search..." (input)="onSearch($event)">
    </mat-form-field>
</div>

<table mat-table [dataSource]="employees" class="mat-elevation-z8">

    <!-- ID -->
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let e">{{ e.id }}</td>
    </ng-container>

    <!-- First Name -->
    <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef>First Name</th>
        <td mat-cell *matCellDef="let e">{{ e.firstName }}</td>
    </ng-container>

    <!-- Last Name -->
    <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef>Last Name</th>
        <td mat-cell *matCellDef="let e">{{ e.lastName }}</td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let e">{{ e.email }}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let e">

            <button mat-button (click)="openEdit(e)">Edit</button>

            <button mat-button color="warn" (click)="delete(e)">
                Delete
            </button>

        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

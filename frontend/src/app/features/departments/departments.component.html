<div class="toolbar">
    <button mat-raised-button color="primary" (click)="openCreate()">
        + Add Department
    </button>

    <mat-form-field>
        <input matInput placeholder="Search..." (input)="onSearch($event)">
    </mat-form-field>
</div>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <!-- ID -->
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let e">{{ e.id }}</td>
    </ng-container>

    <!-- Department Name -->
    <ng-container matColumnDef="name">
        <th mat-header-cell mat-sort-header *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let e">{{ e.name }}</td>
    </ng-container>

    <ng-container matColumnDef="employeeCount">
        <th mat-header-cell mat-sort-header *matHeaderCellDef>Employees</th>
        <td mat-cell *matCellDef="let e">{{ e.employeeCount }}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let department">
            @if (isAdmin) {
            <button mat-icon-button (click)="openEdit(department)">
                <mat-icon>edit</mat-icon>
            </button>
            <!-- <button mat-icon-button color="warn" (click)="delete(department)">
                <mat-icon>delete</mat-icon>
            </button> -->
            }
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,25]" showFirstLastButtons>
</mat-paginator>

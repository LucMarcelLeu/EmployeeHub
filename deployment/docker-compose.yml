services:
  
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    image: employeehub-frontend
    container_name: employeehub-frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - employeehub-network

  api:
    build:
      context: ../backend
      dockerfile: EmployeeHub.Api/Dockerfile
    image: employeehub-api
    container_name: employeehub-api
    ports:
      - "5132:5132"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver;
        Database=EmployeeHub;
        User Id=sa;
        Password=${SA_PASSWORD};
        TrustServerCertificate=True;
      Authentication__Authority: http://keycloak:8080/realms/employeehub
      Authentication__MetadataAddress: http://keycloak:8080/realms/employeehub/.well-known/openid-configuration

    depends_on:
      keycloak:
        condition: service_started

    networks:
      - employeehub-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: employeehub-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    
    networks:
      - employeehub-network

  postgres:
    image: postgres:17
    container_name: employeehub-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - employeehub-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: employeehub-keycloak
    command:
      - start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_HOSTNAME: http://localhost:8080  
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true" 
      KC_HTTP_ENABLED: "true"
      
    ports:
      - "8080:8080"

    depends_on:
      - postgres

    networks:
      - employeehub-network

volumes:
  sqlserver-data:
  postgres-data:

networks:
  employeehub-network:
    driver: bridge
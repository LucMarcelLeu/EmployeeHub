name: Build EmployeeHub

on:
  workflow_dispatch:
  
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EmployeeHub.slnx

      - name: Test
        run: dotnet test EmployeeHub.slnx --no-restore

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API Image
        if: github.event_name != 'pull_request'
        run: |
          docker build \
            -t ghcr.io/lucmarcelleu/employeehub-api:latest \
            -f EmployeeHub.Api/Dockerfile .

      - name: Push API Image
        if: github.event_name != 'pull_request'
        run: |
          docker push \
          ghcr.io/lucmarcelleu/employeehub-api:latest

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Frontend Image
        if: github.event_name != 'pull_request'
        run: |
          docker build \
          -t ghcr.io/lucmarcelleu/employeehub-frontend:latest \
          -f frontend/Dockerfile .

      - name: Push Frontend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push \
          ghcr.io/lucmarcelleu/employeehub-frontend:latest
